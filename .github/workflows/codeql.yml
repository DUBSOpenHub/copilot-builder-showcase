name: CodeQL

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "34 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # Private repos without code scanning enabled cannot upload alerts.
          # Flip this to "always" after code scanning/GHAS is available.
          upload: never
