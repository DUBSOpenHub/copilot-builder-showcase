name: CodeQL

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "34 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # GitHub Advanced Security is required before private-repository
          # uploads can be accepted by the platform.
          upload: never
