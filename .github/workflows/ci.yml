name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile
        run: python -m py_compile hackathon_judge.py hackathon_judge_dashboard.py event_spec.py bundle_reader.py

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Test
        run: python -m pytest -q
