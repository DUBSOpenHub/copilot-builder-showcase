name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile
        run: python -m py_compile hackathon_launcher.py hackathon_judge.py hackathon_judge_dashboard.py event_spec.py bundle_reader.py

      - name: Check installer syntax
        run: bash -n install.sh

      - name: Install test dependencies
        run: python -m pip install pytest "textual>=8,<9"

      - name: Test
        run: python -m pytest -q

      - name: Smoke test beginner install
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          cleanup() {
            chmod -R u+w "$root" 2>/dev/null || true
            rm -rf "$root"
          }
          trap cleanup EXIT

          git branch -f installer-smoke HEAD
          HJ_REPOSITORY_URL="file://$GITHUB_WORKSPACE" \
            HJ_REF=installer-smoke \
            HJ_INSTALL_DIR="$root/install" \
            HJ_BIN_DIR="$root/bin" \
            HJ_SKIP_OPTIONAL_MONITOR=1 \
            bash install.sh > "$root/install.log"

          "$root/bin/hackathon" --help > "$root/help.log"
          "$root/bin/hackathon" --version > "$root/version.log"
          HJ_RUNS_DIR="$root/runs" \
            HJ_REGISTRY_PATH="$root/registry/log.ndjson" \
            HJ_COLOR=never \
            "$root/bin/hackathon" --demo --run-id ci-demo --no-suspense --yes \
            > "$root/demo.log"

          grep -q "Type: hackathon" "$root/install.log"
          grep -q "hackathon owner/project-one owner/project-two" "$root/help.log"
          grep -q "3.1.0" "$root/version.log"
          grep -q "PRACTICE SHOW — ILLUSTRATIVE RESULTS" "$root/demo.log"
